<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Menu AI — internal preview</title>
<meta name="description" content="Internal page. Password required." />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#26A8B0" />
<link rel="icon" type="image/png" sizes="32x32" href="https://www.culiquiz.nl/assets/favicon-32.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Montserrat:ital,wght@0,300..700;1,300..500&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#26A8B0; --teal-dark:#1B7A80; --teal-deep:#0F4E54; --teal-soft:#E6F4F5;
    --red:#A91917; --red-soft:#F6E2E1; --yellow:#EAB600; --yellow-ink:#9C7A00; --yellow-soft:#FBF1CC;
    --orange:#E15E17; --orange-soft:#FBE6D9; --grey:#C3CBD0;
    --ink:#1A2226; --muted:#5E6A70; --line:#E7ECEE; --bg:#ffffff; --bg-soft:#F6FAFA; --antraciet:#16201F;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:'Montserrat',system-ui,sans-serif;color:var(--ink);background:var(--bg);font-weight:400;line-height:1.65;font-size:16px;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,h4{font-family:'Fraunces',Georgia,serif;font-weight:900;line-height:1.08;letter-spacing:-.015em;}
  em{font-style:italic;}
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;display:block;}
  .wrap{max-width:1120px;margin:0 auto;padding:0 24px;}

  .ribbon{background:var(--antraciet);color:#cfe7e8;font-size:12.5px;letter-spacing:.04em;text-align:center;padding:7px 16px;font-weight:500;}
  .ribbon strong{color:var(--yellow);font-weight:700;}

  .nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line);}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;}
  .nav .logo img{height:32px;width:auto;}
  .nav-right{display:flex;align-items:center;gap:22px;}
  .nav-links{display:flex;align-items:center;gap:22px;}
  .nav-links a{font-size:14px;font-weight:500;color:var(--ink);transition:color .12s;}
  .nav-links a:hover{color:var(--teal);}
  .nav-back{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-size:13.5px;font-weight:600;}
  .nav-back:hover{color:var(--teal);}
  .nav-tag{display:inline-flex;align-items:center;gap:7px;background:var(--teal);color:#fff;padding:7px 14px;border-radius:999px;font-weight:700;font-size:12.5px;}
  .nav-tag .dot{width:8px;height:8px;border-radius:50%;background:#fff;}
.nav-lang{display:inline-flex;align-items:center;justify-content:center;min-width:34px;border:1.5px solid var(--line);color:var(--muted);padding:6px 11px;border-radius:999px;font-weight:700;font-size:12.5px;transition:border-color .12s,color .12s;}
  .nav-lang:hover{border-color:var(--teal);color:var(--teal);}
  .nav-lang::after{display:none !important;}
  @media (max-width:920px){.nav-links{display:none;}}

  .hero{background:linear-gradient(160deg,#F6FAFA 0%, #E6F4F5 100%);position:relative;overflow:hidden;}
  .hero::after{content:"";position:absolute;top:-140px;right:-120px;width:460px;height:460px;border-radius:50%;background:radial-gradient(circle, rgba(234,182,0,.20) 0%, transparent 70%);}
  .hero::before{content:"";position:absolute;bottom:-160px;left:-140px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle, rgba(225,94,23,.12) 0%, transparent 70%);}
  .hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:40px;align-items:center;padding:60px 0 56px;position:relative;z-index:1;}
  .eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:var(--teal-dark);display:inline-flex;align-items:center;gap:10px;margin-bottom:18px;background:rgba(255,255,255,.6);padding:7px 14px 7px 10px;border-radius:999px;border:1px solid rgba(38,168,176,.2);}
  .eyebrow::before{content:"";width:24px;height:2px;background:var(--yellow);display:inline-block;}
  .hero h1{font-size:clamp(34px,5vw,56px);color:var(--ink);}
  .hero h1 em{color:var(--teal);font-style:normal;position:relative;}
  .hero h1 em::after{content:"";position:absolute;left:0;right:0;bottom:.06em;height:.16em;background:rgba(234,182,0,.45);border-radius:3px;z-index:-1;}
  .hero .lead{font-size:clamp(16px,1.7vw,18.5px);color:var(--muted);margin-top:20px;max-width:560px;}
  .hero-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px;}
  .pill{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--teal-deep);box-shadow:0 4px 12px rgba(15,78,84,.05);}
  .pill .pdot{width:7px;height:7px;border-radius:50%;background:var(--teal);}
  .pill.y .pdot{background:var(--yellow);} .pill.o .pdot{background:var(--orange);}

  /* hero transform illustration */
  .xform{position:relative;display:flex;align-items:center;justify-content:center;gap:14px;}
  .xform .doc{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 40px rgba(15,78,84,.14);padding:16px 16px 18px;width:170px;}
  .xform .doc .dt{font-family:'Fraunces',serif;font-weight:900;font-size:13px;color:var(--teal-deep);text-align:center;border-bottom:1px dashed var(--line);padding-bottom:7px;margin-bottom:8px;}
  .xform .doc .ln{height:7px;border-radius:4px;background:#EEF3F4;margin-bottom:7px;}
  .xform .doc .ln.s{width:60%;} .xform .doc .ln.m{width:85%;}
  .xform .doc .pr{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-weight:600;margin-top:9px;}
  .xform .arrowx{display:flex;flex-direction:column;align-items:center;color:var(--teal);font-weight:900;font-size:22px;}
  .xform .arrowx small{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--teal-dark);font-weight:700;margin-top:2px;}
  .xform .cards{position:relative;width:160px;height:170px;}
  .xform .gcard{position:absolute;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 28px rgba(15,78,84,.14);padding:12px 13px;width:150px;}
  .xform .gcard .gt{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--teal);margin-bottom:5px;}
  .xform .gcard .gq{font-size:11.5px;font-weight:600;color:var(--ink);line-height:1.35;}
  .xform .gcard.g1{top:0;left:8px;transform:rotate(-4deg);}
  .xform .gcard.g2{top:54px;left:0;transform:rotate(2deg);border-top:3px solid var(--yellow);}
  .xform .gcard.g3{top:110px;left:10px;transform:rotate(-2deg);border-top:3px solid var(--orange);}
  @media (max-width:920px){.hero-grid{grid-template-columns:1fr;gap:30px;padding:44px 0 40px;}.xform{order:-1;}}

  section.block{padding:68px 0;position:relative;}
  .sec-label{font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:var(--teal-dark);margin-bottom:12px;display:inline-flex;align-items:center;gap:9px;}
  .sec-label::before{content:"";width:22px;height:2px;background:var(--yellow);display:inline-block;}
  h2.sec{font-size:clamp(26px,3.4vw,40px);color:var(--ink);max-width:22ch;}
  h2.sec em{color:var(--teal);font-style:normal;position:relative;}
  h2.sec em::after{content:"";position:absolute;left:0;right:0;bottom:.04em;height:.14em;background:rgba(234,182,0,.4);border-radius:3px;z-index:-1;}
  .sec-intro{color:var(--muted);max-width:660px;margin-top:14px;font-size:16.5px;}
  .center{text-align:center;} .center .sec-label{justify-content:center;} .center h2.sec,.center .sec-intro{margin-left:auto;margin-right:auto;}
  .soft{background:var(--bg-soft);}

  .js .reveal{opacity:0;transform:translateY(20px);transition:opacity .6s ease, transform .6s ease;}
  .js .reveal.in{opacity:1;transform:none;}
  .js .reveal.d1{transition-delay:.07s;} .js .reveal.d2{transition-delay:.14s;} .js .reveal.d3{transition-delay:.21s;} .js .reveal.d4{transition-delay:.28s;}
  @media (prefers-reduced-motion:reduce){.js .reveal{opacity:1;transform:none;transition:none;}}

  /* user story */
  .story{background:var(--teal-deep);border-radius:22px;padding:34px 32px;color:#fff;margin-top:40px;position:relative;overflow:hidden;}
  .story::after{content:"";position:absolute;top:-70px;right:-70px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle, rgba(234,182,0,.18) 0%, transparent 70%);}
  .story .q{font-family:'Fraunces',serif;font-weight:900;font-size:clamp(20px,2.4vw,27px);line-height:1.25;position:relative;z-index:1;}
  .story .q b{color:var(--yellow);font-weight:900;}
  .story .sub{color:#bfe0e2;font-size:14px;margin-top:14px;position:relative;z-index:1;}
  .stories2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;}
  .ministory{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px;}
  .ministory .who{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--teal-dark);margin-bottom:5px;}
  .ministory p{font-size:14px;color:var(--ink);}
  .ministory p b{color:var(--teal-deep);}
  @media (max-width:760px){.stories2{grid-template-columns:1fr;}}

  /* flow stepper */
  .flow{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:44px;position:relative;}
  .fstep{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px 18px;position:relative;}
  .fstep::after{content:"";position:absolute;top:50%;right:-12px;width:12px;height:2px;background:var(--grey);z-index:1;}
  .fstep:last-child::after{display:none;}
  .fstep .fn{width:34px;height:34px;border-radius:10px;background:var(--teal);color:#fff;font-family:'Fraunces',serif;font-weight:900;font-size:15px;display:flex;align-items:center;justify-content:center;margin-bottom:13px;}
  .fstep:nth-child(2) .fn{background:var(--teal-dark);}
  .fstep:nth-child(3) .fn{background:var(--yellow);}
  .fstep:nth-child(4) .fn{background:var(--orange);}
  .fstep:nth-child(5) .fn{background:var(--red);}
  .fstep h3{font-size:16px;margin-bottom:7px;}
  .fstep p{font-size:13px;color:var(--muted);}
  @media (max-width:920px){.flow{grid-template-columns:1fr;}.fstep::after{display:none;}}

  /* recognize cards */
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:42px;}
  .rcard{background:#fff;border:1px solid var(--line);border-radius:18px;padding:24px 22px;position:relative;overflow:hidden;transition:transform .15s ease, box-shadow .15s ease;}
  .rcard::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:var(--teal);}
  .rcard:nth-child(2)::before{background:var(--yellow);}
  .rcard:nth-child(3)::before{background:var(--orange);}
  .rcard:nth-child(4)::before{background:var(--grey);}
  .rcard:hover{transform:translateY(-4px);box-shadow:0 16px 36px rgba(15,78,84,.10);}
  .rcard .ic{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;background:var(--teal-soft);color:var(--teal-dark);}
  .rcard:nth-child(2) .ic{background:var(--yellow-soft);color:var(--yellow-ink);}
  .rcard:nth-child(3) .ic{background:var(--orange-soft);color:var(--orange);}
  .rcard:nth-child(4) .ic{background:#EAF0F2;color:var(--teal-deep);}
  .rcard .ic svg{width:24px;height:24px;}
  .rcard h3{font-size:17px;margin-bottom:6px;}
  .rcard .ex{font-size:13px;color:var(--teal-deep);font-weight:600;line-height:1.5;}
  .rcard .later{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--orange);background:var(--orange-soft);padding:2px 8px;border-radius:6px;margin-top:10px;text-transform:uppercase;}
  @media (max-width:920px){.grid4{grid-template-columns:1fr 1fr;}}
  @media (max-width:560px){.grid4{grid-template-columns:1fr;}}

  /* store / database */
  .store{display:grid;grid-template-columns:1.05fr .95fr;gap:36px;align-items:center;margin-top:42px;}
  .store-list{display:flex;flex-direction:column;gap:12px;}
  .sitem{display:flex;gap:13px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:13px;padding:15px 17px;}
  .sitem .si{flex:0 0 36px;width:36px;height:36px;border-radius:10px;background:var(--teal-soft);color:var(--teal-dark);display:flex;align-items:center;justify-content:center;}
  .sitem .si svg{width:18px;height:18px;}
  .sitem h4{font-family:'Montserrat';font-weight:700;font-size:14.5px;margin-bottom:2px;}
  .sitem p{font-size:13px;color:var(--muted);}
  .moat{background:linear-gradient(150deg,var(--teal) 0%, var(--teal-dark) 100%);border-radius:20px;padding:30px 28px;color:#fff;}
  .moat .mt{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--yellow);}
  .moat h3{color:#fff;font-size:22px;margin:6px 0 10px;}
  .moat p{font-size:14.5px;color:rgba(255,255,255,.92);}
  .moat .big{font-family:'Fraunces',serif;font-weight:900;font-size:40px;color:#fff;margin-top:14px;line-height:1;}
  .moat .big small{display:block;font-family:'Montserrat';font-weight:600;font-size:12.5px;color:#bfe0e2;margin-top:5px;}
  @media (max-width:920px){.store{grid-template-columns:1fr;gap:26px;}}

  /* pipeline */
  .pipe{display:flex;align-items:stretch;gap:0;margin-top:44px;flex-wrap:wrap;}
  .pnode{flex:1;min-width:150px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 16px;margin:6px;position:relative;}
  .pnode .pt{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--teal-dark);margin-bottom:6px;}
  .pnode h4{font-family:'Montserrat';font-weight:700;font-size:14.5px;margin-bottom:4px;color:var(--ink);}
  .pnode p{font-size:12.5px;color:var(--muted);}
  .pnode code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;background:var(--bg-soft);border:1px solid var(--line);border-radius:5px;padding:1px 5px;color:var(--teal-deep);}
  .pnode.hl{background:var(--teal-deep);border-color:var(--teal-deep);}
  .pnode.hl .pt{color:var(--yellow);} .pnode.hl h4{color:#fff;} .pnode.hl p{color:#bfe0e2;}
  .pnode.hl code{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2);color:#fff;}
  .schema{margin-top:30px;background:#0F4E54;border-radius:16px;padding:22px 24px;color:#e8f5f6;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;line-height:1.7;overflow-x:auto;}
  .schema .k{color:#8fd3d8;} .schema .v{color:#EAB600;} .schema .c{color:#7c969a;}

  /* distribution */
  .dist{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:42px;}
  .dcard{background:#fff;border:1px solid var(--line);border-radius:18px;padding:26px 22px;border-top:4px solid var(--teal);}
  .dcard:nth-child(2){border-top-color:var(--orange);}
  .dcard:nth-child(3){border-top-color:var(--red);}
  .dcard .ic{width:48px;height:48px;border-radius:13px;background:var(--teal-soft);color:var(--teal-dark);display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
  .dcard:nth-child(2) .ic{background:var(--orange-soft);color:var(--orange);}
  .dcard:nth-child(3) .ic{background:var(--red-soft);color:var(--red);}
  .dcard .ic svg{width:23px;height:23px;}
  .dcard h3{font-size:18px;margin-bottom:7px;}
  .dcard p{font-size:14px;color:var(--muted);}
  @media (max-width:920px){.dist{grid-template-columns:1fr;}}

  /* phases */
  .phases{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:42px;}
  .phase{background:#fff;border:1px solid var(--line);border-radius:18px;padding:26px 24px;position:relative;}
  .phase.now{border:2px solid var(--teal);}
  .phase .pl{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#fff;background:var(--teal);padding:4px 11px;border-radius:7px;margin-bottom:12px;}
  .phase.two .pl{background:var(--grey);color:var(--ink);}
  .phase h3{font-size:19px;margin-bottom:8px;}
  .phase ul{list-style:none;}
  .phase li{font-size:14px;color:var(--muted);padding-left:20px;position:relative;margin-bottom:7px;}
  .phase li::before{content:"";position:absolute;left:0;top:8px;width:8px;height:8px;border-radius:50%;background:var(--teal);}
  .phase.two li::before{background:var(--grey);}
  @media (max-width:760px){.phases{grid-template-columns:1fr;}}

  /* expectations */
  .expect{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:42px;}
  .exp{display:flex;gap:13px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:13px;padding:18px 18px;}
  .exp .ck{flex:0 0 26px;width:26px;height:26px;border-radius:8px;background:#E4F6EC;color:#2f9e57;display:flex;align-items:center;justify-content:center;margin-top:1px;}
  .exp .ck svg{width:15px;height:15px;}
  .exp h4{font-family:'Montserrat';font-weight:700;font-size:14.5px;margin-bottom:3px;}
  .exp p{font-size:13px;color:var(--muted);}
  @media (max-width:760px){.expect{grid-template-columns:1fr;}}

  .final{background:linear-gradient(135deg,var(--teal) 0%, var(--teal-dark) 100%);color:#fff;text-align:center;}
  .final h2{font-size:clamp(26px,3.4vw,38px);color:#fff;margin-bottom:14px;}
  .final h2 em{color:var(--yellow);font-style:normal;}
  .final p{font-size:16.5px;color:rgba(255,255,255,.92);max-width:640px;margin:0 auto 8px;}

  footer.foot{background:#0B3B40;color:rgba(255,255,255,.72);padding:46px 0 28px;font-size:14px;}
  .foot-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:36px;align-items:start;}
  .foot .logo img{height:28px;margin-bottom:14px;filter:brightness(0) invert(1);}
  .foot .tagline{font-size:13.5px;color:rgba(255,255,255,.65);max-width:300px;}
  .foot h4{font-family:'Montserrat';font-weight:700;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;color:#fff;margin-bottom:12px;}
  .foot .note{font-size:13px;color:rgba(255,255,255,.7);}
  .foot .note .lock{color:var(--yellow);font-weight:700;}
  .foot a.back{color:#9fe0e3;font-weight:600;}
  .foot-bottom{border-top:1px solid rgba(255,255,255,.14);margin-top:34px;padding-top:18px;display:flex;flex-wrap:wrap;justify-content:space-between;gap:10px;font-size:12px;color:rgba(255,255,255,.5);}
  @media (max-width:760px){.foot-grid{grid-template-columns:1fr;gap:24px;}}
</style>

<style>
  /* ---- kaders strip ---- */
  .frames{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:0;}
  .frame{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 18px;border-left:4px solid var(--teal);}
  .frame:nth-child(2){border-left-color:var(--orange);}
  .frame:nth-child(3){border-left-color:var(--yellow);}
  .frame .ft{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--teal-dark);margin-bottom:6px;}
  .frame:nth-child(2) .ft{color:var(--orange);}
  .frame:nth-child(3) .ft{color:var(--yellow-ink);}
  .frame h4{font-family:'Montserrat';font-weight:700;font-size:15px;margin-bottom:4px;color:var(--ink);}
  .frame p{font-size:13px;color:var(--muted);}
  .frames-band{background:var(--teal-deep);padding:40px 0;}
  .frames-band .sec-label{color:var(--yellow);}
  .frames-band h2.sec{color:#fff;}
  @media(max-width:920px){.frames{grid-template-columns:1fr;}}
  /* ---- worked example ---- */
  .example{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:34px;}
  .ex-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:24px;}
  .ex-card .ec-h{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--teal-dark);margin-bottom:14px;}
  .ex-line{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;background:var(--bg-soft);border:1px solid var(--line);border-radius:8px;padding:11px 13px;margin-bottom:14px;color:var(--ink);}

  var SS_KEY="cq20_pw";
  function b2u(b){return Uint8Array.from(atob(b),function(c){return c.charCodeAt(0);});}
  var gate=document.getElementById('cq-gate'),
      form=document.getElementById('cq-gate-form'),
      pw=document.getElementById('cq-pw'),
      btn=document.getElementById('cq-unlock'),
      err=document.getElementById('cq-err'),
      content=document.getElementById('cq-content');

  function initReveal(){
    document.documentElement.classList.add('js');
    var els=content.querySelectorAll('.reveal');
    if(!('IntersectionObserver' in window)){els.forEach(function(e){e.classList.add('in');});return;}
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');obs.unobserve(e.target);}});
    },{threshold:.12,rootMargin:'0px 0px -40px 0px'});
    els.forEach(function(e){obs.observe(e);});
  }

  async function decrypt(password){
    var enc=new TextEncoder();
    var base=await crypto.subtle.importKey('raw',enc.encode(password),'PBKDF2',false,['deriveKey']);
    var key=await crypto.subtle.deriveKey(
      {name:'PBKDF2',salt:b2u(SALT),iterations:ITER,hash:'SHA-256'},
      base,{name:'AES-GCM',length:256},false,['decrypt']);
    var buf=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2u(IV)},key,b2u(BLOB));
    return new TextDecoder().decode(buf);
  }

  async function unlock(password,silent){
    if(!silent){btn.disabled=true;err.textContent='Even ontsleutelen…';}
    try{
      var htmlStr=await decrypt(password);
      content.innerHTML=htmlStr;
      content.classList.add('shown');
      gate.parentNode.removeChild(gate);
      try{sessionStorage.setItem(SS_KEY,password);}catch(e){}
      initReveal();
      window.scrollTo(0,0);
    }catch(e){
      if(!silent){err.textContent='Onjuist wachtwoord.';btn.disabled=false;pw.value='';pw.focus();}
    }
  }

  form.addEventListener('submit',function(e){e.preventDefault();var v=pw.value.trim();if(!v)return;unlock(v,false);});

  // auto-unlock binnen dezelfde tab-sessie
  try{var saved=sessionStorage.getItem(SS_KEY);if(saved){unlock(saved,true);}}catch(e){}
})();
