<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CuliQuiz &amp; Lightspeed, a partnership</title>
<meta name="description" content="CuliQuiz and Lightspeed: visibility with young professionals, training internal and external, and the effect measurable in the POS." />
<meta name="robots" content="noindex,nofollow" />
<meta name="theme-color" content="#26A8B0" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Montserrat:ital,wght@0,300..700;1,300..500&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#26A8B0;
    --teal-dark:#1B7A80;
    --teal-deep:#0F4E54;
    --teal-soft:#E6F4F5;
    --gold:#EAB600;
    --gold-soft:#FBF1CC;
    --ink:#1A2226;
    --muted:#5E6A70;
    --line:#E7ECEE;
    --bg:#ffffff;
    --bg-soft:#F6FAFA;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Montserrat',system-ui,sans-serif;
    color:var(--ink);
    background:var(--bg);
    font-weight:400;
    line-height:1.7;
    font-size:16.5px;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{font-family:'Fraunces',Georgia,serif;font-weight:900;line-height:1.12;letter-spacing:-.015em;}
  em{font-style:italic;}
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;display:block;}
  .wrap{max-width:880px;margin:0 auto;padding:0 24px;}
  .wide{max-width:1080px;}

  /* ---------- GATE (wachtwoord) ---------- */
  html.cq-locked body > *:not(#cqGate){visibility:hidden;}
  html.cq-locked, html.cq-locked body{overflow:hidden;}
  html:not(.cq-locked) #cqGate{display:none;}
  .cq-gate{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#0F4E54 0%, #26A8B0 100%);display:flex;align-items:center;justify-content:center;padding:24px;visibility:visible !important;}
  .cq-gate-card{background:#fff;border-radius:18px;padding:38px 32px 32px;max-width:380px;width:100%;text-align:center;box-shadow:0 30px 60px -16px rgba(15,78,84,.5);}
  .cq-gate-card img{height:36px;width:auto;margin:0 auto 18px;display:block;}
  .cq-gate-card h2{font-family:'Fraunces',serif;font-weight:900;font-size:24px;color:var(--ink);margin-bottom:8px;line-height:1.15;}
  .cq-gate-card p{color:var(--muted);font-size:14px;margin-bottom:22px;line-height:1.5;}
  .cq-gate-card input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font:inherit;font-size:15px;margin-bottom:10px;color:var(--ink);box-sizing:border-box;}
  .cq-gate-card input:focus{outline:2px solid var(--teal);outline-offset:1px;border-color:transparent;}
  .cq-gate-card button{width:100%;padding:12px 24px;background:var(--teal);color:#fff;border:0;border-radius:10px;font:inherit;font-weight:700;font-size:15px;cursor:pointer;transition:background .15s ease;}
  .cq-gate-card button:hover{background:var(--teal-dark);}
  .cq-gate-card .cq-gate-error{color:#C53030;font-size:13px;margin:8px 0 0;}

  /* ---------- NAV ---------- */
  .nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.94);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line);}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;gap:16px;}
  .nav-logos{display:flex;align-items:center;gap:14px;}
  .nav{height:140px;}
  .nav-inner{height:140px;}
  .nav-logos{gap:18px;}
  .nav-logos .logo img{height:50px;width:auto;display:block;}
  .nav-logos .cross{color:#B7C2C6;font-size:28px;font-weight:300;line-height:1;}
  .nav-logos .partner img{height:108px;width:auto;display:block;}
  .nav-meta{font-size:13px;color:var(--muted);}
  .nav-meta strong{color:var(--ink);font-weight:600;}
  @media (max-width:560px){
    .nav{height:72px;}.nav-inner{height:72px;}
    .nav-logos{gap:10px;}
    .nav-logos .partner, .nav-logos .cross{display:none;}
    .nav-logos .logo img{height:38px;}
    .nav-meta{display:none;}
  }
  @media print { .nav{display:none;} }

  /* ---------- HERO ---------- */
  .hero{background:linear-gradient(165deg,#F6FAFA 0%, #E6F4F5 100%);padding:90px 0 80px;position:relative;overflow:hidden;}
  .hero::after{content:"";position:absolute;top:-130px;right:-100px;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle, rgba(234,182,0,.18) 0%, transparent 70%);pointer-events:none;}
  .eyebrow{font-size:12px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:var(--teal-dark);margin-bottom:22px;display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,.7);padding:8px 16px 8px 12px;border-radius:999px;border:1px solid rgba(38,168,176,.2);}
  .eyebrow::before{content:"";width:22px;height:2px;background:var(--gold);display:inline-block;}
  .hero h1{font-size:clamp(34px,4.6vw,52px);color:var(--ink);max-width:18ch;}
  .hero h1 em{color:var(--teal);position:relative;}
  .hero h1 em::after{content:"";position:absolute;left:0;right:0;bottom:.08em;height:.16em;background:rgba(234,182,0,.4);border-radius:3px;z-index:-1;}
  .hero .lead{font-size:clamp(16.5px,1.6vw,19px);color:var(--muted);margin-top:24px;max-width:58ch;}

  /* ---------- SECTION ---------- */
  section.block{padding:80px 0;}
  section.block.tight{padding:60px 0;}
  section.alt{background:var(--bg-soft);}
  section.dark{background:var(--teal-deep);color:#fff;}
  section.dark h2{color:#fff;}
  section.dark h2 em{color:var(--gold);}
  section.dark p{color:rgba(255,255,255,.85);}

  .sec-label{font-size:12px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:var(--teal-dark);margin-bottom:14px;display:inline-flex;align-items:center;gap:9px;}
  .sec-label::before{content:"";width:22px;height:2px;background:var(--gold);display:inline-block;}
  section.dark .sec-label{color:var(--gold);}
  h2.sec{font-size:clamp(26px,3.2vw,38px);max-width:20ch;}
  h2.sec em{color:var(--teal);position:relative;}
  h2.sec em::after{content:"";position:absolute;left:0;right:0;bottom:.06em;height:.14em;background:rgba(234,182,0,.4);border-radius:3px;z-index:-1;}
  .sec-intro{color:var(--muted);max-width:64ch;margin-top:16px;font-size:17px;}
  section.dark .sec-intro{color:rgba(255,255,255,.85);}

  .lead-body{font-size:17px;margin-top:28px;max-width:64ch;color:var(--ink);}
  .lead-body p{margin-bottom:14px;}
  section.dark .lead-body{color:rgba(255,255,255,.92);}

  /* ---------- PATH BLOCK ---------- */
  .paths{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:42px;}
  .path{background:#fff;border:1px solid var(--line);border-radius:18px;padding:34px 30px;transition:transform .15s ease, box-shadow .15s ease;}
  .path:hover{transform:translateY(-3px);box-shadow:0 18px 40px rgba(15,78,84,.10);}
  .path .tag{display:inline-block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:var(--teal-dark);background:var(--teal-soft);padding:5px 10px;border-radius:6px;margin-bottom:14px;}
  .path.gold .tag{color:#7a5b00;background:var(--gold-soft);}
  .path h3{font-size:22px;margin-bottom:14px;}
  .path h3 em{color:var(--teal);}
  .path.gold h3 em{color:#a37e00;}
  .path .what{font-size:14px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:18px;margin-bottom:6px;}
  .path p{font-size:16px;color:var(--ink);}
  .path-list{list-style:none;padding:0;margin:0;}
  .path-list li{position:relative;padding-left:18px;margin-bottom:9px;font-size:15.5px;color:var(--ink);line-height:1.55;}
  .path-list li::before{content:"";position:absolute;left:0;top:.72em;width:9px;height:2px;background:var(--teal);}
  .path.gold .path-list li::before{background:var(--gold);}
  @media (max-width:780px){.paths{grid-template-columns:1fr;}}

  /* ---------- TIMELINE ---------- */
  .timeline{display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;margin-top:42px;}
  .phase{background:#fff;border-left:4px solid var(--gold);padding:24px 28px;border-radius:0 12px 12px 0;box-shadow:0 6px 18px rgba(15,78,84,.05);}
  .phase.future{border-left-color:var(--teal);}
  .phase .when{font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--muted);margin-bottom:8px;}
  .phase h3{font-size:19px;margin-bottom:10px;}
  .phase p{font-size:15.5px;color:var(--muted);}
  @media (max-width:780px){.timeline{grid-template-columns:1fr;}}

  /* ---------- BEURZEN ---------- */
  .shows-section{padding:80px 0;background:linear-gradient(135deg,#F0F9FA 0%, #E6F4F5 100%);}
  .shows-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:40px;}
  .show-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:28px 26px;box-shadow:0 6px 18px rgba(15,78,84,.05);transition:transform .15s ease, box-shadow .15s ease;}
  .show-card:hover{transform:translateY(-3px);box-shadow:0 14px 32px rgba(15,78,84,.10);}
  .show-card .show-date{font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--teal-dark);margin-bottom:14px;display:inline-flex;align-items:center;gap:8px;}
  .show-card .show-date::before{content:"";width:18px;height:2px;background:var(--gold);display:inline-block;}
  .show-card h3{font-size:20px;margin-bottom:10px;color:var(--ink);}
  .show-card h3 em{color:var(--teal);font-style:italic;}
  .show-card p{font-size:15px;color:var(--ink);line-height:1.6;}
  .show-card .show-link{display:inline-flex;align-items:center;gap:6px;margin-top:14px;color:var(--teal-dark);font-weight:600;font-size:14px;border-bottom:1px solid rgba(38,168,176,.3);transition:border-color .15s ease;}
  .show-card .show-link:hover{border-bottom-color:var(--teal);}
  @media (max-width:780px){.shows-grid{grid-template-columns:1fr;}}

  /* ---------- DASHBOARD EMBED (scaled fit) ---------- */
  .dashboard-embed{margin-top:36px;position:relative;width:100%;aspect-ratio:1440/900;overflow:hidden;border-radius:14px;box-shadow:0 24px 60px rgba(15,78,84,.14);border:1px solid var(--line);background:#fff;}
  .dashboard-frame{position:absolute;top:0;left:0;width:1440px;height:900px;transform-origin:top left;transform:scale(var(--dash-scale,.6));}
  .dashboard-frame iframe{width:100%;height:100%;border:0;display:block;}
  .dashboard-meta{margin-top:14px;display:flex;justify-content:space-between;align-items:center;gap:16px;font-size:13.5px;color:var(--muted);flex-wrap:wrap;}
  .dashboard-meta a{color:var(--teal-dark);font-weight:600;border-bottom:1px solid rgba(38,168,176,.3);transition:border-color .15s ease;}
  .dashboard-meta a:hover{border-bottom-color:var(--teal);}

  @media print{.dashboard-embed{display:none;}}

  /* ---------- CLOSER ---------- */
  .closer{background:linear-gradient(135deg,var(--teal) 0%, var(--teal-dark) 100%);color:#fff;padding:80px 0 70px;text-align:center;}
  .closer h2{font-size:clamp(28px,3.4vw,40px);color:#fff;margin-bottom:18px;}
  .closer p{font-size:17px;color:rgba(255,255,255,.92);max-width:50ch;margin:0 auto 30px;}
  .signature{margin-top:36px;font-size:15px;color:rgba(255,255,255,.92);line-height:1.7;}
  .signature strong{font-weight:600;color:#fff;}

  /* ---------- FOOTER ---------- */
  footer.foot{background:#0B3B40;color:rgba(255,255,255,.65);padding:38px 0 30px;font-size:13.5px;text-align:center;}
  .foot a{color:rgba(255,255,255,.85);}
  .foot a:hover{color:var(--gold);}

  /* ---------- PRINT ---------- */
  @media print{
    body{font-size:11pt;}
    .hero, section.block, .closer{page-break-inside:avoid;padding:30px 0;}
    section.dark, .closer{background:#fff !important;color:var(--ink) !important;}
    section.dark h2, .closer h2{color:var(--ink) !important;}
    section.dark p, section.dark .lead-body, .closer p, .signature{color:var(--muted) !important;}
  }

  /* ---------- MINI GAME (cq-game prefix) ---------- */
  .cq-game-section{padding:64px 0;background:var(--bg);}
  .cq-game-stage{display:flex;justify-content:center;margin-top:40px;}
  .cq-game-device{
    width:100%;max-width:306px;height:648px;
    background:linear-gradient(180deg,#0F4E54 0%, #1B7A80 100%);
    border-radius:48px;overflow:hidden;
    display:flex;flex-direction:column;position:relative;
    box-shadow:0 30px 60px -16px rgba(15,78,84,.4), inset 0 0 0 2px rgba(255,255,255,.06);
    border:11px solid #0c0c0e;
    font-family:'Montserrat',system-ui,sans-serif;color:#fff;
    -webkit-user-select:none;user-select:none;
  }
  .cq-game-device::before{content:"";position:absolute;inset:0;
    background-image:
      radial-gradient(circle at 25% 30%, rgba(255,255,255,.14) 2px, transparent 2.5px),
      radial-gradient(circle at 75% 70%, rgba(234,182,0,.18) 1.6px, transparent 2px),
      radial-gradient(circle, rgba(255,255,255,.06) 1.2px, transparent 1.6px);
    background-size:120px 120px, 90px 90px, 26px 26px;
    background-position:0 0, 0 0, 0 0;
    pointer-events:none;z-index:1;}
  .cq-game-device::after{content:"";position:absolute;top:12px;left:50%;transform:translateX(-50%);
    width:92px;height:22px;background:#050607;border-radius:999px;z-index:30;pointer-events:none;}

  .cq-game-topbar{display:flex;align-items:center;justify-content:center;gap:10px;padding:48px 18px 6px;position:relative;z-index:5;}
  .cq-game-topbar img.cq-cuq{height:22px;width:auto;filter:brightness(0) invert(1);}
  .cq-game-topbar .cq-game-cross{color:rgba(255,255,255,.55);font-size:16px;font-weight:300;line-height:1;}
  .cq-game-topbar img.cq-rat{height:22px;width:auto;background:#fff;padding:6px 10px;border-radius:8px;box-sizing:content-box;box-shadow:0 2px 6px rgba(0,0,0,.18);}
  .cq-game-sublabel{text-align:center;font-size:9.5px;letter-spacing:.22em;font-weight:700;color:rgba(255,255,255,.7);position:relative;z-index:5;margin-top:2px;}

  .cq-game-body{position:relative;flex:1;overflow:hidden;background:transparent;}

  .cq-game-screen{position:absolute;inset:0;display:none;flex-direction:column;padding:14px 16px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .cq-game-screen::-webkit-scrollbar{display:none;}
  .cq-game-screen.is-active{display:flex;animation:cqgfade .25s ease both;}
  @keyframes cqgfade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @keyframes cqCardIn{from{opacity:0;transform:translateY(-10px) scale(.96);}to{opacity:1;transform:none;}}
  @keyframes cqAnswerIn{from{opacity:0;transform:translateX(-16px);}to{opacity:1;transform:none;}}
  @keyframes cqIconPulse{0%,100%{transform:translateY(-50%) scale(1);box-shadow:0 0 0 0 rgba(225,94,23,.45);}50%{transform:translateY(-50%) scale(1.06);box-shadow:0 0 0 10px rgba(225,94,23,0);}}
  @keyframes cqPopHit{0%{transform:scale(1);}40%{transform:scale(1.05);}100%{transform:scale(1);}}
  @keyframes cqShakeHit{0%,100%{transform:translateX(0);}20%{transform:translateX(-5px);}40%{transform:translateX(5px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
  @keyframes cqScorePop{0%{transform:scale(1);}40%{transform:scale(1.18);}100%{transform:scale(1);}}
  @keyframes cqDotPop{0%{transform:scale(1);}50%{transform:scale(1.6);}100%{transform:scale(1);}}

  .cq-game-hud{display:flex;align-items:center;justify-content:center;gap:8px;padding:0 0 6px;}
  .cq-game-chip{display:inline-flex;align-items:center;gap:6px;background:#fff;color:#0F4E54;font-weight:700;font-size:11.5px;padding:5px 13px;border-radius:999px;}
  .cq-game-chip .cq-x3{color:#E15E17;font-weight:800;display:inline-block;}
  .cq-game-chip.is-pop{animation:cqScorePop .45s cubic-bezier(.2,1.5,.4,1);}
  .cq-game-progress{display:flex;justify-content:center;gap:6px;padding:0 0 10px;}
  .cq-game-progress span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.25);transition:background .3s ease;}
  .cq-game-progress span.on{background:#EAB600;animation:cqDotPop .4s cubic-bezier(.2,1.4,.4,1);}

  @media (prefers-reduced-motion:reduce){
    .cq-game-card, .cq-game-card.is-fresh, .cq-game-card::before, .cq-game-answer,
    .cq-game-answer.is-correct, .cq-game-answer.is-wrong,
    .cq-game-chip.is-pop, .cq-game-progress span.on{
      animation:none !important;
    }
  }

  /* START screen */
  .cq-game-start{justify-content:center;align-items:center;text-align:center;}
  .cq-game-start h3{font-family:'Fraunces',serif;font-size:26px;font-weight:900;margin-bottom:10px;color:#fff;}
  .cq-game-start p{font-size:13.5px;color:rgba(255,255,255,.85);max-width:24ch;margin:0 auto 24px;line-height:1.5;}
  .cq-game-startbtn{appearance:none;border:0;cursor:pointer;font-family:inherit;font-weight:700;font-size:15px;color:#0F4E54;padding:12px 28px;border-radius:999px;background:#EAB600;box-shadow:0 6px 0 #B48A00;transition:transform .1s ease,box-shadow .1s ease;}
  .cq-game-startbtn:active{transform:translateY(3px);box-shadow:0 3px 0 #B48A00;}

  /* PLAY screen */
  .cq-game-play{justify-content:flex-start;align-items:stretch;}
  .cq-game-card{width:100%;background:#fff;border-radius:14px;padding:13px 14px 13px 56px;position:relative;box-shadow:0 8px 20px -4px rgba(0,0,0,.25);margin-bottom:11px;}
  .cq-game-card.is-fresh{animation:cqCardIn .4s cubic-bezier(.2,.8,.2,1) both;}
  .cq-game-card::before{content:"?";position:absolute;left:11px;top:50%;transform:translateY(-50%);width:36px;height:36px;background:#E15E17;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:900;font-size:23px;animation:cqIconPulse 2.2s ease-in-out infinite;}
  .cq-game-card .cq-game-q{font-size:15px;font-weight:600;color:#0F4E54;line-height:1.35;}
  .cq-game-answers{display:flex;flex-direction:column;gap:8px;width:100%;}
  .cq-game-answer{
    position:relative;background:#EAB600;color:#0F4E54;
    padding:10px 14px 10px 44px;font-weight:700;font-size:12px;
    cursor:pointer;border:0;text-align:left;line-height:1.3;
    clip-path:polygon(0 0, calc(100% - 14px) 0, 100% 100%, 14px 100%);
    transition:background .15s ease;
    font-family:inherit;
    animation:cqAnswerIn .4s cubic-bezier(.2,.8,.2,1) both;
  }
  .cq-game-answer:nth-child(1){animation-delay:.10s;}
  .cq-game-answer:nth-child(2){animation-delay:.18s;}
  .cq-game-answer:nth-child(3){animation-delay:.26s;}
  .cq-game-answer .cq-game-letter{
    position:absolute;left:8px;top:0;bottom:0;width:28px;display:flex;align-items:center;justify-content:center;
    background:#D4A300;font-family:'Fraunces',serif;font-weight:900;font-size:16px;color:#fff;
    clip-path:polygon(0 0, 100% 0, calc(100% - 14px) 100%, 14px 100%);
  }
  .cq-game-answer:hover:not(:disabled){background:#F2C42A;}
  .cq-game-answer:disabled{cursor:default;opacity:.95;}
  .cq-game-answer.is-correct{background:#5DA836;color:#fff;animation:cqPopHit .45s cubic-bezier(.2,1.4,.4,1);}
  .cq-game-answer.is-correct .cq-game-letter{background:#3F7E1E;color:#fff;}
  .cq-game-answer.is-wrong{background:#D8463A;color:#fff;animation:cqShakeHit .4s ease;}
  .cq-game-answer.is-wrong .cq-game-letter{background:#B2301F;color:#fff;}

  .cq-game-feedback{margin-top:11px;padding:9px 12px;background:rgba(0,0,0,.25);border-radius:10px;color:#fff;font-size:11.5px;line-height:1.4;display:none;width:100%;}
  .cq-game-feedback.is-shown{display:block;animation:cqgfade .25s ease both;}
  .cq-game-feedback strong{display:block;margin-bottom:3px;color:#EAB600;font-size:10.5px;letter-spacing:.05em;}
  .cq-game-nextbtn{margin-top:10px;appearance:none;border:0;cursor:pointer;font-family:inherit;font-weight:700;font-size:12.5px;color:#0F4E54;padding:9px 22px;border-radius:999px;background:#EAB600;box-shadow:0 4px 0 #B48A00;align-self:center;}
  .cq-game-nextbtn:active{transform:translateY(2px);box-shadow:0 2px 0 #B48A00;}

  /* RESULT screen */
  .cq-game-result{justify-content:center;align-items:center;text-align:center;}
  .cq-game-result .cq-game-score{font-family:'Fraunces',serif;font-weight:900;font-size:48px;color:#EAB600;margin-bottom:4px;}
  .cq-game-result h3{font-family:'Fraunces',serif;font-size:22px;color:#fff;margin-bottom:8px;}
  .cq-game-result p{font-size:13px;color:rgba(255,255,255,.85);max-width:26ch;margin:0 auto 20px;line-height:1.5;}
  .cq-game-stars{display:flex;gap:6px;margin-bottom:22px;}
  .cq-game-stars span{width:24px;height:24px;background:#EAB600;clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);}
  .cq-game-stars span.off{background:rgba(255,255,255,.25);}

  @media (max-width:420px){.cq-game-device{height:580px;}}
  @media print{.cq-game-section{display:none;}}

  /* ---------- SCROLL REVEAL ---------- */
  .js .reveal{opacity:0;transform:translateY(20px);transition:opacity .55s ease, transform .55s ease;}
  .js .reveal.in{opacity:1;transform:none;}
  .js .reveal.d1{transition-delay:.08s;}
  .js .reveal.d2{transition-delay:.16s;}
  @media (prefers-reduced-motion:reduce){.js .reveal{opacity:1;transform:none;transition:none;}}

  /* ---------- LIGHTSPEED additions ---------- */
  .hero h1{max-width:30ch;}
  .nav-logos .logo img{height:44px;}
  .nav-logos .partner.chip{display:inline-flex;align-items:center;background:#1A2226;border-radius:11px;padding:11px 18px;}
  .nav-logos .partner.chip img{height:27px;width:auto;display:block;}
  @media (max-width:560px){ .nav-logos .partner.chip{padding:8px 12px;} .nav-logos .partner.chip img{height:20px;} }
  .nav-lang{display:inline-flex;align-items:center;justify-content:center;min-width:38px;border:1.5px solid var(--line);color:var(--muted);padding:7px 13px;border-radius:999px;font-weight:700;font-size:13px;letter-spacing:.04em;transition:border-color .15s,color .15s;}
  .nav-lang:hover{border-color:var(--teal);color:var(--teal);}
  /* what-labels (ook buiten .path, bv. in de zichtbaarheid-sectie) */
  .what, .path .what{font-size:11.5px;letter-spacing:.07em;text-transform:uppercase;font-weight:700;color:var(--teal-dark);margin-bottom:5px;}
  .path.gold .what{color:#a37e00;}
  .path .what{margin-top:18px;}
  /* POS loop */
  .psteps{display:flex;align-items:stretch;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:42px;}
  .pstep{flex:1;min-width:180px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px 16px;text-align:center;box-shadow:0 6px 18px rgba(15,78,84,.05);}
  .pstep .pn{width:32px;height:32px;border-radius:9px;background:var(--teal);color:#fff;font-family:'Fraunces',Georgia,serif;font-weight:900;font-size:15px;display:flex;align-items:center;justify-content:center;margin:0 auto 11px;}
  .pstep.pos .pn{background:var(--gold);color:#3a2e00;}
  .pstep.dash .pn{background:var(--teal-deep);}
  .pstep h4{font-size:15px;color:var(--ink);margin-bottom:4px;}
  .pstep p{font-size:12.5px;color:var(--muted);line-height:1.45;}
  .parrow{display:flex;align-items:center;color:var(--teal);font-weight:900;font-size:20px;}
  @media (max-width:860px){ .psteps{flex-direction:column;} .parrow{transform:rotate(90deg);justify-content:center;} }
  /* effect dashboard */
  .efx{margin-top:18px;background:var(--teal-deep);border-radius:18px;padding:26px 28px;color:#fff;}
  .efx-h{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;}
  .efx-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .efx .e{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:18px;text-align:center;}
  .efx .ev{font-family:'Fraunces',Georgia,serif;font-weight:900;font-size:28px;color:#fff;}
  .efx .el{font-size:12px;color:#bfe0e2;margin-top:4px;line-height:1.35;}
  .efx-note{font-size:12px;color:#9fc4c7;margin-top:14px;}
  @media (max-width:860px){ .efx-grid{grid-template-columns:repeat(2,1fr);} }
  @media (max-width:520px){ .efx-grid{grid-template-columns:1fr;} }
  /* win-win two-column */
  .winwin{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:36px;}
  .ww{background:#fff;border:1px solid var(--line);border-radius:16px;padding:28px 30px;box-shadow:0 10px 30px rgba(15,78,84,.06);}
  .ww.us{border-top:3px solid var(--teal);}
  .ww.them{border-top:3px solid var(--gold);}
  .ww h4{font-size:16px;color:var(--ink);margin-bottom:14px;}
  .ww ul{list-style:none;padding:0;margin:0;}
  .ww li{position:relative;padding-left:20px;margin-bottom:10px;font-size:14.5px;color:var(--ink);line-height:1.5;}
  .ww li:last-child{margin-bottom:0;}
  .ww li::before{content:"";position:absolute;left:0;top:.72em;width:10px;height:2px;background:var(--teal);}
  .ww.them li::before{background:var(--gold);}
  @media (max-width:760px){ .winwin{grid-template-columns:1fr;} }
  /* closer cta */
  .closer .cta{display:inline-flex;align-items:center;gap:10px;background:#fff;color:var(--teal-deep);font-weight:700;font-size:15px;padding:15px 30px;border-radius:999px;transition:transform .15s,box-shadow .15s;box-shadow:0 12px 30px rgba(0,0,0,.20);}
  .closer .cta:hover{transform:translateY(-2px);box-shadow:0 18px 44px rgba(0,0,0,.28);}

</style>

<style>

  #cq-gate .lock{width:56px;height:56px;border-radius:16px;background:#E6F4F5;color:#0F4E54;display:flex;

  #cq-gate form{display:flex;flex-direction:column;gap:10px;}
  #cq-gate input{font:inherit;font-size:15px;padding:13px 14px;border:1px solid #d9e1e2;border-radius:10px;background:#f5f7f7;color:#1A2226;width:100%;box-sizing:border-box;}
  #cq-gate input:focus{outline:2px solid #26A8B0;outline-offset:1px;border-color:transparent;}
  #cq-gate button{font:inherit;font-weight:700;font-size:15px;padding:13px 14px;border:none;border-radius:10px;background:#26A8B0;color:#fff;cursor:pointer;transition:background .12s;}
  #cq-gate button:hover{background:#1B7A80;}
  #cq-gate button:disabled{opacity:.6;cursor:wait;}
  #cq-gate .err{color:#A91917;font-size:13px;font-weight:600;min-height:18px;margin-top:2px;}

</style>

    var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');obs.unobserve(e.target);}});},{threshold:.12,rootMargin:'0px 0px -40px 0px'});
    els.forEach(function(el){obs.observe(el);});
  }
  async function unlock(password, silent){
    var btn=document.getElementById('cq-unlock'); var err=document.getElementById('cq-err');
    if(btn){btn.disabled=true;}
    try{
      var enc=new TextEncoder();
      var km=await crypto.subtle.importKey('raw', enc.encode(password), {name:'PBKDF2'}, false, ['deriveKey']);
      var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2u(SALT),iterations:ITER,hash:'SHA-256'}, km, {name:'AES-GCM',length:256}, false, ['decrypt']);
      var plain=await crypto.subtle.decrypt({name:'AES-GCM', iv:b2u(IV)}, key, b2u(BLOB));
      var content=document.getElementById('cq-content');
      content.innerHTML=new TextDecoder().decode(plain);
      content.classList.add('shown');
      var g=document.getElementById('cq-gate'); if(g){g.parentNode.removeChild(g);}
      try{sessionStorage.setItem(SS_KEY,password);}catch(e){}
      document.documentElement.classList.add('js');
      runReveal();
    }catch(e){
      if(btn){btn.disabled=false;}
      if(!silent){ if(err){err.textContent='Onjuist wachtwoord.';} try{sessionStorage.removeItem(SS_KEY);}catch(x){} }
    }
  }
  function init(){
    var form=document.getElementById('cq-gate-form');
    if(form){form.addEventListener('submit', function(e){e.preventDefault(); unlock(document.getElementById('cq-pw').value, false);});}
    try{var saved=sessionStorage.getItem(SS_KEY); if(saved){unlock(saved, true);}}catch(e){}
  }
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded', init);}else{init();}
})();
