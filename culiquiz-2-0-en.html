<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CuliQuiz 2.0 — internal preview</title>
<meta name="description" content="Interne pagina. Wachtwoord vereist." />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#26A8B0" />
<link rel="icon" type="image/png" sizes="32x32" href="https://www.culiquiz.nl/assets/favicon-32.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Montserrat:ital,wght@0,300..700;1,300..500&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#26A8B0;
    --teal-dark:#1B7A80;
    --teal-deep:#0F4E54;
    --teal-soft:#E6F4F5;
    --red:#A91917;
    --red-soft:#F6E2E1;
    --yellow:#EAB600;
    --yellow-ink:#9C7A00;
    --yellow-soft:#FBF1CC;
    --orange:#E15E17;
    --orange-soft:#FBE6D9;
    --grey:#C3CBD0;
    --ink:#1A2226;
    --muted:#5E6A70;
    --line:#E7ECEE;
    --bg:#ffffff;
    --bg-soft:#F6FAFA;
    --antraciet:#16201F;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Montserrat',system-ui,sans-serif;
    color:var(--ink);
    background:var(--bg);
    font-weight:400;
    line-height:1.65;
    font-size:16px;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{font-family:'Fraunces',Georgia,serif;font-weight:900;line-height:1.08;letter-spacing:-.015em;}
  em{font-style:italic;}
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;display:block;}
  .wrap{max-width:1120px;margin:0 auto;padding:0 24px;}

  /* ---------- PRIVATE RIBBON ---------- */
  .ribbon{background:var(--antraciet);color:#cfe7e8;font-size:12.5px;letter-spacing:.04em;text-align:center;padding:7px 16px;font-weight:500;}
  .ribbon strong{color:var(--yellow);font-weight:700;}

  /* ---------- NAV ---------- */
  .nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line);}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;}
  .nav .logo img{height:32px;width:auto;}
  .nav-right{display:flex;align-items:center;gap:22px;}
  .nav-links{display:flex;align-items:center;gap:22px;}
  .nav-links a{font-size:14px;font-weight:500;color:var(--ink);transition:color .12s;position:relative;}
  .nav-links a::after{content:"";position:absolute;left:0;right:100%;bottom:-5px;height:2px;background:var(--yellow);transition:right .2s ease;}
  .nav-links a:hover{color:var(--teal);}
  .nav-links a:hover::after{right:0;}
  .nav-tag{display:inline-flex;align-items:center;gap:7px;background:var(--teal-soft);color:var(--teal-deep);padding:7px 14px;border-radius:999px;font-weight:600;font-size:12.5px;}
  .nav-tag .dot{width:8px;height:8px;border-radius:50%;background:var(--teal);}
.nav-lang{display:inline-flex;align-items:center;justify-content:center;min-width:34px;border:1.5px solid var(--line);color:var(--muted);padding:6px 11px;border-radius:999px;font-weight:700;font-size:12.5px;transition:border-color .12s,color .12s;}
  .nav-lang:hover{border-color:var(--teal);color:var(--teal);}
  .nav-lang::after{display:none !important;}
  .nav-ai{display:inline-flex;align-items:center;gap:7px;background:var(--teal);color:#fff !important;padding:8px 16px;border-radius:999px;font-weight:700;font-size:13px;box-shadow:0 6px 16px rgba(38,168,176,.28);transition:background .12s,transform .12s;}
  .nav-ai:hover{background:var(--teal-dark);transform:translateY(-1px);}
  .nav-ai::after{display:none !important;}
  @media (max-width:920px){.nav-links{display:none;}}

  /* ---------- HERO ---------- */
  .hero{background:linear-gradient(160deg,#F6FAFA 0%, #E6F4F5 100%);position:relative;overflow:hidden;}
  .hero::after{content:"";position:absolute;top:-140px;right:-120px;width:460px;height:460px;border-radius:50%;background:radial-gradient(circle, rgba(234,182,0,.20) 0%, transparent 70%);pointer-events:none;}
  .hero::before{content:"";position:absolute;bottom:-160px;left:-140px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle, rgba(225,94,23,.12) 0%, transparent 70%);pointer-events:none;}
  .hero-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:40px;align-items:center;padding:64px 0 60px;position:relative;z-index:1;}
  .eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:var(--teal-dark);display:inline-flex;align-items:center;gap:10px;margin-bottom:18px;background:rgba(255,255,255,.6);padding:7px 14px 7px 10px;border-radius:999px;border:1px solid rgba(38,168,176,.2);}
  .eyebrow::before{content:"";width:24px;height:2px;background:var(--yellow);display:inline-block;}
  .hero h1{font-size:clamp(34px,5vw,58px);color:var(--ink);}
  .hero h1 em{color:var(--teal);font-style:normal;position:relative;}
  .hero h1 em::after{content:"";position:absolute;left:0;right:0;bottom:.06em;height:.16em;background:rgba(234,182,0,.45);border-radius:3px;z-index:-1;}
  .hero .lead{font-size:clamp(16px,1.7vw,18.5px);color:var(--muted);margin-top:20px;max-width:560px;}
  .hero-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px;}
  .pill{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--teal-deep);box-shadow:0 4px 12px rgba(15,78,84,.05);}
  .pill .pdot{width:7px;height:7px;border-radius:50%;background:var(--teal);}
  .pill.y .pdot{background:var(--yellow);}
  .pill.o .pdot{background:var(--orange);}
  .hero-visual{position:relative;display:flex;justify-content:center;}
  .hero-visual::before{content:"";position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle, rgba(38,168,176,.22) 0%, transparent 70%);z-index:0;}
  .hero-visual .phone{max-height:470px;width:auto;position:relative;z-index:1;filter:drop-shadow(0 24px 50px rgba(15,78,84,.28));}
  .float-chip{position:absolute;z-index:2;background:#fff;border-radius:14px;padding:10px 14px;box-shadow:0 12px 28px rgba(15,78,84,.16);display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:var(--ink);animation:floaty 4s ease-in-out infinite;}
  .float-chip .badge{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
  .float-chip svg{width:15px;height:15px;}
  .float-chip.c1{top:12%;left:-6%;}
  .float-chip.c1 .badge{background:var(--yellow);}
  .float-chip.c2{top:45%;right:-8%;animation-delay:1.3s;}
  .float-chip.c2 .badge{background:#1a9c50;}
  .float-chip.c3{bottom:11%;left:0;animation-delay:2.1s;}
  .float-chip.c3 .badge{background:var(--orange);}
  @keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-9px);}}
  @media (prefers-reduced-motion:reduce){.float-chip{animation:none;}}
  @media (max-width:920px){
    .hero-grid{grid-template-columns:1fr;gap:28px;padding:44px 0 40px;}
    .hero-visual{order:-1;}
    .hero-visual .phone{max-height:300px;}
    .float-chip{font-size:12px;padding:8px 11px;}
  }
  @media (max-width:480px){.float-chip.c3{display:none;}}

  /* ---------- SECTION SHELL ---------- */
  section.block{padding:70px 0;position:relative;}
  .sec-label{font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:var(--teal-dark);margin-bottom:12px;display:inline-flex;align-items:center;gap:9px;}
  .sec-label::before{content:"";width:22px;height:2px;background:var(--yellow);display:inline-block;}
  h2.sec{font-size:clamp(26px,3.4vw,40px);color:var(--ink);max-width:20ch;}
  h2.sec em{color:var(--teal);font-style:normal;position:relative;}
  h2.sec em::after{content:"";position:absolute;left:0;right:0;bottom:.04em;height:.14em;background:rgba(234,182,0,.4);border-radius:3px;z-index:-1;}
  .sec-intro{color:var(--muted);max-width:640px;margin-top:14px;font-size:16.5px;}
  .center{text-align:center;}
  .center .sec-label{justify-content:center;}
  .center h2.sec,.center .sec-intro{margin-left:auto;margin-right:auto;}
  .soft{background:var(--bg-soft);}

  /* ---------- REVEAL ---------- */
  .js .reveal{opacity:0;transform:translateY(20px);transition:opacity .6s ease, transform .6s ease;}
  .js .reveal.in{opacity:1;transform:none;}
  .js .reveal.d1{transition-delay:.07s;}
  .js .reveal.d2{transition-delay:.14s;}
  .js .reveal.d3{transition-delay:.21s;}
  .js .reveal.d4{transition-delay:.28s;}
  @media (prefers-reduced-motion:reduce){.js .reveal{opacity:1;transform:none;transition:none;}}

  /* ---------- VALUE / AUDIENCE ---------- */
  .grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-top:42px;}
  .vtag{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px 18px;text-align:center;transition:transform .15s ease, box-shadow .15s ease;}
  .vtag:hover{transform:translateY(-4px);box-shadow:0 16px 36px rgba(15,78,84,.10);}
  .vtag .ic{width:46px;height:46px;border-radius:12px;background:var(--teal-soft);color:var(--teal-dark);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
  .vtag .ic svg{width:23px;height:23px;}
  .vtag h4{font-family:'Montserrat';font-weight:700;font-size:14px;color:var(--ink);}
  @media (max-width:920px){.grid-5{grid-template-columns:repeat(2,1fr);}}

  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:42px;}
  .who{background:#fff;border:1px solid var(--line);border-radius:18px;padding:26px 22px;position:relative;overflow:hidden;transition:transform .15s ease, box-shadow .15s ease;}
  .who::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:var(--teal);}
  .who:nth-child(2)::before{background:var(--yellow);}
  .who:nth-child(3)::before{background:var(--orange);}
  .who:nth-child(4)::before{background:var(--red);}
  .who:hover{transform:translateY(-4px);box-shadow:0 16px 36px rgba(15,78,84,.10);}
  .who .ic{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;background:var(--teal-soft);color:var(--teal-dark);}
  .who:nth-child(2) .ic{background:var(--yellow-soft);color:var(--yellow-ink);}
  .who:nth-child(3) .ic{background:var(--orange-soft);color:var(--orange);}
  .who:nth-child(4) .ic{background:var(--red-soft);color:var(--red);}
  .who .ic svg{width:24px;height:24px;}
  .who h3{font-size:18px;margin-bottom:6px;}
  .who p{font-size:14px;color:var(--muted);}
  @media (max-width:920px){.grid4{grid-template-columns:1fr 1fr;}}
  @media (max-width:560px){.grid4{grid-template-columns:1fr;}}

  /* ---------- MODEL DIAGRAM ---------- */
  .model{display:grid;grid-template-columns:1fr 1fr;gap:46px;align-items:center;margin-top:44px;}
  .model-copy h3{font-size:21px;margin:0 0 10px;}
  .model-copy p{color:var(--muted);font-size:15.5px;margin-bottom:18px;}
  .principle{display:flex;gap:13px;align-items:flex-start;margin-bottom:14px;}
  .principle .pn{flex:0 0 26px;width:26px;height:26px;border-radius:8px;background:var(--teal);color:#fff;font-family:'Fraunces',serif;font-weight:900;font-size:13px;display:flex;align-items:center;justify-content:center;margin-top:1px;}
  .principle b{font-weight:700;}
  .principle span{font-size:14.5px;color:var(--ink);}
  .principle span small{display:block;color:var(--muted);font-size:13px;font-weight:400;}
  .diagram{background:var(--teal-deep);border-radius:22px;padding:34px 28px;color:#fff;position:relative;overflow:hidden;}
  .diagram::after{content:"";position:absolute;top:-80px;right:-80px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle, rgba(234,182,0,.18) 0%, transparent 70%);}
  .dia-top{text-align:center;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:14px;font-weight:700;letter-spacing:.02em;position:relative;z-index:1;}
  .dia-top small{display:block;font-weight:400;font-size:12.5px;color:#bfe0e2;margin-top:2px;}
  .dia-stem{width:2px;height:22px;background:rgba(255,255,255,.3);margin:0 auto;position:relative;z-index:1;}
  .dia-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;position:relative;z-index:1;}
  .dia-node{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-radius:13px;padding:14px;text-align:center;}
  .dia-node .nh{font-weight:700;font-size:14.5px;}
  .dia-node .ns{font-size:12px;color:#bfe0e2;margin-top:2px;}
  .dia-node.full{grid-column:1 / -1;}
  .dia-link{text-align:center;font-size:12.5px;color:var(--yellow);font-weight:600;margin:14px 0 6px;letter-spacing:.02em;position:relative;z-index:1;}
  .dia-flow{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;position:relative;z-index:1;font-size:13px;font-weight:600;}
  .dia-flow .fnode{background:rgba(255,255,255,.12);border-radius:9px;padding:7px 12px;}
  .dia-flow .arr{color:var(--yellow);}
  @media (max-width:920px){.model{grid-template-columns:1fr;gap:30px;}}

  /* ---------- ORG TYPES ---------- */
  .types{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-top:42px;}
  .type{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px 18px;transition:transform .15s ease, box-shadow .15s ease;}
  .type:hover{transform:translateY(-4px);box-shadow:0 16px 36px rgba(15,78,84,.10);}
  .type .ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:13px;background:var(--teal-soft);color:var(--teal-dark);}
  .type:nth-child(2) .ic{background:var(--yellow-soft);color:var(--yellow-ink);}
  .type:nth-child(3) .ic{background:var(--orange-soft);color:var(--orange);}
  .type:nth-child(4) .ic{background:var(--red-soft);color:var(--red);}
  .type:nth-child(5) .ic{background:#EAF0F2;color:var(--teal-deep);}
  .type .ic svg{width:22px;height:22px;}
  .type h3{font-size:16px;margin-bottom:7px;}
  .type .ex{font-size:12.5px;color:var(--teal-deep);font-weight:600;margin-bottom:8px;line-height:1.45;}
  .type p{font-size:13px;color:var(--muted);}
  @media (max-width:920px){.types{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:560px){.types{grid-template-columns:1fr;}}

  /* ---------- LIFECYCLE ---------- */
  .life{display:flex;align-items:stretch;gap:0;margin-top:42px;flex-wrap:wrap;}
  .life-step{flex:1;min-width:150px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 16px;position:relative;margin:6px;}
  .life-step .ls-dot{width:11px;height:11px;border-radius:50%;background:var(--teal);margin-bottom:10px;}
  .life-step:nth-child(2) .ls-dot{background:#3DBE6B;}
  .life-step:nth-child(3) .ls-dot{background:var(--yellow);}
  .life-step:nth-child(4) .ls-dot{background:var(--orange);}
  .life-step:nth-child(5) .ls-dot{background:var(--red);}
  .life-step h4{font-family:'Montserrat';font-weight:700;font-size:14.5px;margin-bottom:4px;color:var(--ink);}
  .life-step p{font-size:12.5px;color:var(--muted);}
  .life-step .future{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.05em;color:var(--orange);background:var(--orange-soft);padding:2px 7px;border-radius:6px;margin-top:7px;text-transform:uppercase;}

  .invite{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:26px;}
  .inv{background:var(--bg-soft);border:1px solid var(--line);border-radius:12px;padding:14px 12px;text-align:center;}
  .inv .num{font-family:'Fraunces',serif;font-weight:900;color:var(--teal);font-size:16px;}
  .inv p{font-size:12px;color:var(--muted);margin-top:4px;}
  @media (max-width:920px){.invite{grid-template-columns:repeat(3,1fr);}}
  @media (max-width:480px){.invite{grid-template-columns:1fr 1fr;}}

  /* ---------- ROLES + MATRIX ---------- */
  .roles{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:42px;}
  .role{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px 20px;}
  .role .rh{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .role .rh .ic{width:38px;height:38px;border-radius:10px;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;}
  .role:nth-child(2) .rh .ic{background:var(--orange);}
  .role:nth-child(3) .rh .ic{background:var(--yellow);}
  .role:nth-child(4) .rh .ic{background:var(--teal-deep);}
  .role .rh .ic svg{width:19px;height:19px;}
  .role h3{font-size:16px;}
  .role ul{list-style:none;margin-top:4px;}
  .role li{font-size:13px;color:var(--muted);padding-left:18px;position:relative;margin-bottom:5px;}
  .role li::before{content:"";position:absolute;left:0;top:8px;width:7px;height:7px;border-radius:50%;background:var(--teal);}
  @media (max-width:920px){.roles{grid-template-columns:1fr 1fr;}}
  @media (max-width:560px){.roles{grid-template-columns:1fr;}}

  .matrix-wrap{margin-top:34px;overflow-x:auto;border:1px solid var(--line);border-radius:16px;}
  table.matrix{width:100%;border-collapse:collapse;font-size:13.5px;min-width:620px;}
  table.matrix th,table.matrix td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--line);}
  table.matrix thead th{background:var(--teal-deep);color:#fff;font-family:'Montserrat';font-weight:600;font-size:12.5px;letter-spacing:.02em;}
  table.matrix thead th:not(:first-child){text-align:center;}
  table.matrix td:not(:first-child){text-align:center;}
  table.matrix tbody tr:nth-child(even){background:var(--bg-soft);}
  table.matrix td:first-child{font-weight:600;color:var(--ink);}
  .yes{color:#2f9e57;font-weight:700;}
  .no{color:#c0392b;font-weight:700;}
  .own{color:var(--teal-dark);font-weight:600;font-size:12px;}

  .caps{display:flex;flex-wrap:wrap;gap:10px;margin-top:30px;}
  .cap{background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 16px;font-size:13px;font-weight:600;color:var(--teal-deep);display:inline-flex;align-items:center;gap:8px;}
  .cap .cdot{width:8px;height:8px;border-radius:50%;background:var(--teal);}
  .cap.future{color:var(--muted);}
  .cap.future .cdot{background:var(--grey);}
  .cap .ftag{font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--orange);text-transform:uppercase;}

  /* ---------- CAMPAIGNS ---------- */
  .camp-types{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:42px;}
  .camp{background:#fff;border:1px solid var(--line);border-radius:18px;padding:26px 22px;border-top:4px solid var(--teal);}
  .camp:nth-child(2){border-top-color:var(--orange);}
  .camp:nth-child(3){border-top-color:var(--red);}
  .camp .ct-tag{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--teal-dark);}
  .camp:nth-child(2) .ct-tag{color:var(--orange);}
  .camp:nth-child(3) .ct-tag{color:var(--red);}
  .camp h3{font-size:19px;margin:8px 0 10px;}
  .camp .lbl{font-size:12px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.04em;margin-top:12px;}
  .camp p{font-size:14px;color:var(--muted);margin-top:3px;}
  .camp .exs{font-size:13px;color:var(--teal-deep);font-weight:600;margin-top:3px;}
  @media (max-width:920px){.camp-types{grid-template-columns:1fr;}}

  .components{display:flex;flex-wrap:wrap;gap:9px;margin-top:34px;}
  .comp{background:var(--bg-soft);border:1px solid var(--line);border-radius:9px;padding:8px 13px;font-size:12.5px;font-weight:600;color:var(--teal-deep);}

  .builder{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:34px;}
  .bstep{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 16px;position:relative;}
  .bstep .bn{width:30px;height:30px;border-radius:9px;background:var(--teal-soft);color:var(--teal-deep);font-family:'Fraunces',serif;font-weight:900;font-size:14px;display:flex;align-items:center;justify-content:center;margin-bottom:11px;}

  var SS_KEY="cq20_pw";
  function b2u(b){return Uint8Array.from(atob(b),function(c){return c.charCodeAt(0);});}
  var gate=document.getElementById('cq-gate'),
      form=document.getElementById('cq-gate-form'),
      pw=document.getElementById('cq-pw'),
      btn=document.getElementById('cq-unlock'),
      err=document.getElementById('cq-err'),
      content=document.getElementById('cq-content');

  function initReveal(){
    document.documentElement.classList.add('js');
    var els=content.querySelectorAll('.reveal');
    if(!('IntersectionObserver' in window)){els.forEach(function(e){e.classList.add('in');});return;}
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');obs.unobserve(e.target);}});
    },{threshold:.12,rootMargin:'0px 0px -40px 0px'});
    els.forEach(function(e){obs.observe(e);});
  }

  async function decrypt(password){
    var enc=new TextEncoder();
    var base=await crypto.subtle.importKey('raw',enc.encode(password),'PBKDF2',false,['deriveKey']);
    var key=await crypto.subtle.deriveKey(
      {name:'PBKDF2',salt:b2u(SALT),iterations:ITER,hash:'SHA-256'},
      base,{name:'AES-GCM',length:256},false,['decrypt']);
    var buf=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2u(IV)},key,b2u(BLOB));
    return new TextDecoder().decode(buf);
  }

  async function unlock(password,silent){
    if(!silent){btn.disabled=true;err.textContent='Even ontsleutelen…';}
    try{
      var htmlStr=await decrypt(password);
      content.innerHTML=htmlStr;
      content.classList.add('shown');
      gate.parentNode.removeChild(gate);
      try{sessionStorage.setItem(SS_KEY,password);}catch(e){}
      initReveal();
      window.scrollTo(0,0);
    }catch(e){
      if(!silent){err.textContent='Onjuist wachtwoord.';btn.disabled=false;pw.value='';pw.focus();}
    }
  }

  form.addEventListener('submit',function(e){e.preventDefault();var v=pw.value.trim();if(!v)return;unlock(v,false);});

  // auto-unlock binnen dezelfde tab-sessie
  try{var saved=sessionStorage.getItem(SS_KEY);if(saved){unlock(saved,true);}}catch(e){}
})();
